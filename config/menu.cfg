# ============================================================
# 文件名: menu.cfg
# 功能说明: 配置 - 菜单配置文件
# 编码格式: GBK (简体中文)
# 注意事项: 本文件使用GBK编码保存，请勿用UTF-8编码打开
# ============================================================
# AllegroSkillToolbox 菜单配置文件
# 格式:
#   &MenuName           -> 顶层菜单名
#   >SubMenuName        -> 子菜单开始
#   <                   -> 子菜单结束
#   "标签","命令"       -> 菜单项
#   ---                 -> 分隔线

