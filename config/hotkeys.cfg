# ============================================================
# 文件名: hotkeys.cfg
# 功能说明: 配置 - 快捷键配置文件
# 编码格式: GBK (简体中文)
# 注意事项: 本文件使用GBK编码保存，请勿用UTF-8编码打开
# ============================================================
# AllegroSkillToolbox Hotkey Configuration
# Supports multiple modes: default, layout, router, check
# Format: mode::key="command"
#   mode   -> hotkey mode name
#   key    -> Allegro funckey (e.g. F2, ~F2, C)
#   command-> Registered AST_ command or SKILL expression
#
# Special keys:
#   ~F2    -> Shift+F2
#   F2     -> F2 alone
#   C      -> single letter (requires prefix in Allegro)

# ===================================================================
# DEFAULT mode — active when no mode switch triggered
# ===================================================================
default::F2="skill AST_Tools_Calculator"
default::F3="skill AST_Tools_UnitConvert"
default::F4="skill AST_ColorSetting"
default::F5="skill AST_DelDangling"
default::F6="skill AST_CheckNoRefdes"

# ===================================================================
# LAYOUT mode — placement and alignment shortcuts
# ===================================================================
layout::F2="skill AST_Layout_Align"
layout::F3="skill AST_AlignTop"
layout::F4="skill AST_AlignBottom"
layout::F5="skill AST_AlignLeft"
layout::F6="skill AST_AlignRight"
layout::F7="skill AST_AlignCenterH"
layout::F8="skill AST_AlignCenterV"
layout::F9="skill AST_MirrorElem"
layout::~F2="skill AST_Layout_Distribute"
layout::~F3="skill AST_Layout_ChangeWidth"
layout::~F4="skill AST_Layout_ReplaceVia"
layout::~F5="skill AST_ChooseGrid"
layout::~F6="skill AST_PlaceInside"

# ===================================================================
# ROUTER mode — routing and trace shortcuts
# ===================================================================
router::F2="skill AST_ClineToShape"
router::F3="skill AST_ClineCrossCheck"
router::F4="skill AST_CheckCrossPlane"
router::F5="skill AST_CreateKeepout"
router::F6="skill AST_Layout_CutCline"
router::F7="skill AST_Router_AutoViaSwap"
router::~F2="skill AST_Check_CrossSplit"
router::~F3="skill AST_DelDangling"

# ===================================================================
# CHECK mode — DFM and verification shortcuts
# ===================================================================
check::F2="skill AST_Check_Acute"
check::F3="skill AST_Check_CrossSplit"
check::F4="skill AST_Check_RefDir"
check::F5="skill AST_CheckNoRefdes"
check::F6="skill AST_Out_Gerber"
check::F7="skill AST_Out_PDF"
check::~F2="skill AST_Out_DXF"
check::~F3="skill AST_ExportDevice"
check::~F4="skill AST_ExportSymbol"

# ===================================================================
# TEXT mode — silkscreen and text shortcuts
# ===================================================================
text::F2="skill AST_Text_AutoSilk"
text::F3="skill AST_Text_SetSize"
text::F4="skill AST_Text_AddChinese"
text::F5="skill AST_CreateNetSilk"
text::F6="skill AST_Text_Logo"

# ===================================================================
# Mode switch commands (always available in any mode)
# ===================================================================
__global__::~F10="skill AST_HotkeyMode_layout"
__global__::~F11="skill AST_HotkeyMode_router"
__global__::~F12="skill AST_HotkeyMode_check"
__global__::F10="skill AST_HotkeyMode_default"
__global__::F11="skill AST_HotkeyMode_text"
__global__::F12="skill AST_HotkeyList"
