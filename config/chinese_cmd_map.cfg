# ============================================================
# 文件名: chinese_cmd_map.cfg
# 功能说明: 配置 - 中文命令映射表
# 编码格式: GBK (简体中文)
# 注意事项: 本文件使用GBK编码保存，请勿用UTF-8编码打开
# ============================================================
;--------------------------------------------------------------------------
; File:      config/chinese_cmd_map.cfg
; Purpose:   FanySkill 中文命令名 → AllegroSkillToolbox AST_ 命令映射表
; Usage:     加载后在 Allegro Command 窗口输入中文别名即可执行
;            (load("config/chinese_cmd_map.cfg"))
;--------------------------------------------------------------------------

;;=========================================================================
;; 辅助函数：注册中文别名
;;=========================================================================
procedure( _AST_RegCN(cnName astCmd)
    axlCmdRegister(cnName astCmd ?cmdType "general")
    printf("[AST] 中文命令注册: %s => %s\n" cnName astCmd)
)

;;=========================================================================
;; P0 移植命令 — 布局类 Layout
;;=========================================================================
_AST_RegCN("对齐"         "AST_Layout_Align")
_AST_RegCN("顶对齐"       "AST_AlignTop")
_AST_RegCN("底对齐"       "AST_AlignBottom")
_AST_RegCN("左对齐"       "AST_AlignLeft")
_AST_RegCN("右对齐"       "AST_AlignRight")
_AST_RegCN("水平居中"     "AST_AlignCenterH")
_AST_RegCN("垂直居中"     "AST_AlignCenterV")
_AST_RegCN("镜像元件"     "AST_MirrorElem")
_AST_RegCN("区域内放置"   "AST_PlaceInside")
_AST_RegCN("网格选择"     "AST_ChooseGrid")
_AST_RegCN("设网格"       "AST_SetGrid")

;;=========================================================================
;; P0 移植命令 — 布线类 Router
;;=========================================================================
_AST_RegCN("线转铜皮"     "AST_ClineToShape")
_AST_RegCN("线交叉检查"   "AST_ClineCrossCheck")
_AST_RegCN("跨平面检查"   "AST_CheckCrossPlane")
_AST_RegCN("创建隔离区"   "AST_CreateKeepout")
_AST_RegCN("差分过孔隔离" "AST_CreateDiffKeepout")

;;=========================================================================
;; P0 移植命令 — 输出类 Output
;;=========================================================================
_AST_RegCN("导出器件"     "AST_ExportDevice")
_AST_RegCN("导出封装"     "AST_ExportSymbol")

;;=========================================================================
;; P0 移植命令 — 检查类 Check / DFM
;;=========================================================================
_AST_RegCN("检查无位号"   "AST_CheckNoRefdes")
_AST_RegCN("删除悬垂"     "AST_DelDangling")

;;=========================================================================
;; P0 移植命令 — 丝印类 Text / Silk
;;=========================================================================
_AST_RegCN("网络丝印"     "AST_CreateNetSilk")

;;=========================================================================
;; P1 新增命令 — 工具类 Tools
;;=========================================================================
_AST_RegCN("颜色设置"     "AST_ColorSetting")
_AST_RegCN("热键加载"     "AST_LoadHotkeys")
_AST_RegCN("热键应用"     "AST_ApplyHotkeys")
_AST_RegCN("热键列表"     "AST_HotkeyList")
_AST_RegCN("热键默认"     "AST_HotkeyMode_default")
_AST_RegCN("热键布局"     "AST_HotkeyMode_layout")
_AST_RegCN("热键布线"     "AST_HotkeyMode_router")
_AST_RegCN("热键检查"     "AST_HotkeyMode_check")
_AST_RegCN("热键丝印"     "AST_HotkeyMode_text")

;;=========================================================================
;; P2 核心框架命令
;;=========================================================================
_AST_RegCN("执行工具"     "AST_ExecTool")
_AST_RegCN("加载模板"     "AST_LoadTemplate")
_AST_RegCN("模板列表"     "AST_TemplateList")
_AST_RegCN("版本检测"     "AST_GetAllegroVersion")
_AST_RegCN("版本适配"     "AST_VersionAdapt")
_AST_RegCN("加载版本模块" "AST_LoadVersionedModule")

;;=========================================================================
;; 旧 FanySkill 命令名 → 新命令名 完整对照
;; 用于兼容旧习惯
;;=========================================================================
_AST_RegCN("FYCA"         "AST_Tools_UnitConvert")   ; 原计算器
_AST_RegCN("FYED"         "AST_ExportDevice")       ; 原导出器件
_AST_RegCN("skn"          "AST_CheckNoRefdes")      ; 原检查无位号
_AST_RegCN("sig_pack"     "AST_ExportSymbol")       ; 原导出封装
_AST_RegCN("FYNN"         "AST_CreateNetSilk")      ; 原网络丝印

printf("[AST] 中文命令映射加载完成，共 %d 条命令\n" 27)
